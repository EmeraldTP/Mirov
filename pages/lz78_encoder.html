<!DOCTYPE html>
<html>
<head>
    <title>LZ78 Encoder/Decoder</title>
    <style>
        body { font-family: sans-serif; margin: 2em; background-color: #f8f9fa; }
        h1, h2 { color: #343a40; }
        .container { display: flex; gap: 2em; }
        .section { flex: 1; }
        #payload, #codewords { padding: 0.5em; font-size: 1em; width: 80%; }
        button { padding: 0.5em 1em; font-size: 1em; cursor: pointer; margin-top: 0.5em; }
        table { border-collapse: collapse; margin-top: 1em; width: 100%; }
        th, td { border: 1px solid #dee2e6; padding: 0.75em; text-align: left; }
        th { background-color: #e9ecef; }
        #decoded-string { margin-top: 1em; font-weight: bold; }

        .table-wrapper {
            overflow-x: auto;
        }

        @media (max-width: 768px) {
            .container {
                flex-direction: column;
            }
            #payload, #codewords {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <h1>LZ78 Encoder/Decoder</h1>
    <div class="container">
        <div class="section">
            <h2>Encoder</h2>
            <input type="text" id="payload" placeholder="Enter payload string..." value="LZ77LZ77.">
            <button onclick="encode()">Encode</button>
            <div id="encoder-table-container"></div>
        </div>
        <div class="section">
            <h2>Decoder</h2>
            <input type="text" id="codewords" placeholder="Enter codewords..." value="(0,L),(0,Z),(0,7),(3,L),(2,7),(3,.)">
            <button onclick="decode()">Decode</button>
            <div id="decoder-table-container"></div>
            <div id="decoded-string"></div>
        </div>
    </div>

    <script>
        function encode() {
            const payload = document.getElementById('payload').value;
            const dictionary = { '': 0 };
            let dictionaryIndex = 1;
            let tableHtml = '<div class="table-wrapper"><table><tr><th>Intrare (dicționar)</th><th>Număr poziție</th><th>Ieșire (cuvânt de cod)</th></tr>';
            tableHtml += '<tr><td>-</td><td>0</td><td>-</td></tr>';
            let buffer = '';
            let encodedString = '';

            for (let i = 0; i < payload.length; i++) {
                const currentChar = payload[i];
                const newBuffer = buffer + currentChar;

                if (dictionary.hasOwnProperty(newBuffer)) {
                    buffer = newBuffer;
                } else {
                    const code = dictionary[buffer];
                    const codeword = `(${code},${currentChar})`;
                    encodedString += codeword;
                    tableHtml += `<tr><td>${newBuffer}</td><td>${dictionaryIndex}</td><td>${codeword}</td></tr>`;
                    dictionary[newBuffer] = dictionaryIndex++;
                    buffer = '';
                }
            }
            
            if (buffer !== '') {
                 const code = dictionary[buffer];
                 const codeword = `(${code},' ')`;
                 encodedString += codeword;
                 tableHtml += `<tr><td>${buffer}</td><td>${dictionaryIndex}</td><td>${codeword}</td></tr>`;
            }

            tableHtml += '</table></div>';
            document.getElementById('encoder-table-container').innerHTML = tableHtml;
            document.getElementById('codewords').value = encodedString;
        }

        function decode() {
            const codewordsInput = document.getElementById('codewords').value;
            const dictionary = [''];
            let decodedString = '';
            let tableHtml = '<div class="table-wrapper"><table><tr><th>Intrare (cuvânt de cod)</th><th>Ieșire și dicționar</th><th>Număr poziție</th></tr>';
            tableHtml += '<tr><td>-</td><td>-</td><td>0</td></tr>';

            const codewords = codewordsInput.match(/\(\d+,.*?\)/g);

            if (!codewords) {
                document.getElementById('decoder-table-container').innerHTML = '<p>Invalid codeword format.</p>';
                return;
            }

            for (let i = 0; i < codewords.length; i++) {
                const parts = codewords[i].replace(/[()]/g, '').split(',');
                const index = parseInt(parts[0]);
                const char = parts[1].replace(/'/g, '');

                let entry = '';
                if (index < dictionary.length) {
                    entry = dictionary[index] + char;
                } else {
                    // This case should ideally not happen with a valid encoding
                    entry = char;
                }
                
                decodedString += entry;
                dictionary.push(entry);
                tableHtml += `<tr><td>${codewords[i]}</td><td>${entry}</td><td>${i + 1}</td></tr>`;
            }

            tableHtml += '</table></div>';
            document.getElementById('decoder-table-container').innerHTML = tableHtml;
            document.getElementById('decoded-string').innerHTML = `<strong>Decoded String:</strong> ${decodedString}`;
        }
        
        window.onload = () => {
            encode();
            decode();
        };
    </script>
</body>
</html>
